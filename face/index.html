<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ORACLE</title>
  <script>
    // Visible error overlay (red bar) — surfaces any runtime/texture error on
    // screen so it can be read without the dev console (useful on a TV).
    (function () {
      function showErr(msg) {
        let d = document.getElementById('err-overlay');
        if (!d) {
          d = document.createElement('div');
          d.id = 'err-overlay';
          d.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:999999;'
            + 'background:rgba(140,0,0,.92);color:#fff;font:12px monospace;padding:6px 8px;'
            + 'white-space:pre-wrap;max-height:45%;overflow:auto;';
          (document.body || document.documentElement).appendChild(d);
        }
        d.textContent += msg + '\n';
      }
      window.__showErr = showErr;
      window.addEventListener('error', function (e) {
        showErr('JS ERROR: ' + (e.message || (e.error && e.error.message) || e.filename) + (e.lineno ? ' @' + e.lineno : ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        showErr('PROMISE: ' + ((e.reason && e.reason.message) || e.reason));
      });
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }

    /* All display layers live in #stage. In vertical mode the stage is rotated
       90° (sized to the swapped viewport) so the face fills a portrait TV. */
    #stage { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: 0; }
    body.vertical #stage {
      width: 100vh; height: 100vw;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
    }

    #bg-video   { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                  object-fit: cover; z-index: 0; }
    #face-canvas { position: absolute; top: 0; left: 0; z-index: 1; transform-origin: center center; }

    /* Hidden live face-calibration panel (position + size), opened from a
       discreet corner dot. Values persist in localStorage. */
    #cal-trigger {
      position: fixed; bottom: 6px; right: 6px; z-index: 100000;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(0,255,0,0.12); cursor: pointer;
    }
    #cal-panel {
      position: fixed; bottom: 40px; right: 10px; z-index: 100000;
      display: none; flex-direction: column; gap: 10px;
      background: rgba(0,0,0,0.85); border: 1px solid #0f0; border-radius: 6px;
      padding: 14px 16px; font-family: 'Courier New', monospace; color: #0f0;
      font-size: 12px; width: 230px;
    }
    #cal-panel.open { display: flex; }
    #cal-panel label { display: flex; flex-direction: column; gap: 4px; }
    #cal-panel input[type=range] { width: 100%; }
    #cal-panel .val { color: #fff; }
    #cal-reset { background:#0f0; color:#000; border:none; padding:6px; cursor:pointer; font-family:inherit; }
    #level-meter-wrap { display:flex; flex-direction:column; gap:4px; }
    #level-meter-wrap span { font-size:10px; color:#888; letter-spacing:1px; }
    #level-bar-bg { background:#111; border:1px solid #333; height:12px; border-radius:2px; overflow:hidden; }
    #level-bar { height:100%; width:0%; background:#0f0; transition:none; }

    /* Password gate (shown on load, before everything). */
    #pass-gate {
      position: fixed; inset: 0; z-index: 200; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; font-family: 'Courier New', monospace; color: #00ff00;
    }
    #pass-gate h1 { font-size: 2em; letter-spacing: 6px; text-shadow: 0 0 20px #00ff00; }
    #pass-gate input {
      background: #111; border: 1px solid #0f0; color: #0f0; text-align: center;
      padding: 10px 14px; font-size: 1.2em; letter-spacing: 6px; border-radius: 4px;
      font-family: 'Courier New', monospace; width: 180px;
    }
    #pass-gate button {
      padding: 10px 34px; background: #00ff00; color: #000; border: none;
      font-family: 'Courier New', monospace; letter-spacing: 3px; cursor: pointer; border-radius: 4px;
    }
    #pass-err { color: #ff4444; min-height: 1.2em; font-size: 0.85em; }
    #scanlines {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,255,0,0.015) 3px, rgba(0,255,0,0.015) 4px
      );
    }
    #bottom-fade { display: none; }   /* removed — no more black gradient at the bottom */
    #subtitle {
      position: absolute; bottom: 40px; left: 0; right: 0;
      text-align: center; z-index: 5;
      font-family: 'Courier New', monospace;
      font-size: 18px; color: #2e9bff;            /* what the USER says — blue */
      text-shadow: 0 0 10px currentColor;
      opacity: 0; transition: opacity 0.2s;
      padding: 0 20px;
    }
    #subtitle-oracle {
      position: absolute; bottom: 96px; left: 0; right: 0;   /* sits ABOVE the user line */
      text-align: center; z-index: 5;
      font-family: 'Courier New', monospace;
      font-size: 20px; color: #00ff66;            /* what ORACLE says — green */
      text-shadow: 0 0 12px currentColor;
      opacity: 0; transition: opacity 0.2s;
      padding: 0 20px;
    }

    /* ── Setup overlay ─────────────────────────────────────── */
    #setup {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 40px;
      font-family: 'Courier New', monospace; color: #eee;
    }
    #setup h1 {
      font-size: 2em; letter-spacing: 6px; color: #00ff00;
      text-shadow: 0 0 20px #00ff00;
    }
    #setup p.sub { color: #555; font-size: 0.8em; letter-spacing: 2px; }
    .setup-group { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 6px; }
    .setup-group label { color: #666; font-size: 0.72em; letter-spacing: 1px; }
    .setup-group select {
      background: #111; border: 1px solid #333; color: #eee;
      padding: 10px 12px; border-radius: 4px; font-size: 0.9em;
      font-family: 'Courier New', monospace; width: 100%;
    }
    #start-btn {
      margin-top: 10px; padding: 12px 40px;
      background: #00ff00; color: #000;
      border: none; font-family: 'Courier New', monospace;
      font-size: 1em; letter-spacing: 3px; cursor: pointer;
      border-radius: 4px;
    }
    #start-btn:hover { background: #00cc00; }
    #setup-error { color: #ff4444; font-size: 0.8em; min-height: 1.2em; }
    #dbg {
      position: fixed; top: 8px; left: 8px; z-index: 999;
      font-family: monospace; font-size: 11px; color: #0f0;
      background: rgba(0,0,0,0.7); padding: 6px 8px; border-radius: 4px;
      pointer-events: none; white-space: pre; display: none;
    }
  </style>
</head>
<body>
  <!-- Password gate (shown first, before setup) -->
  <div id="pass-gate">
    <h1>ORACLE</h1>
    <input id="pass-input" type="password" inputmode="numeric" autocomplete="off" placeholder="••••">
    <button id="pass-btn">ENTRAR</button>
    <p id="pass-err"></p>
  </div>

  <!-- Setup overlay (shown after the gate) -->
  <div id="setup">
    <h1>ORACLE</h1>
    <p class="sub">Configuración de audio</p>

    <div class="setup-group">
      <label>MICRÓFONO</label>
      <select id="mic-select"><option value="">Cargando...</option></select>
    </div>

    <div class="setup-group" id="out-group">
      <label>SALIDA DE AUDIO</label>
      <select id="out-select"><option value="">Por defecto del sistema</option></select>
    </div>

    <div class="setup-group">
      <label>PERSONALIDAD</label>
      <select id="personality-select"><option value="">Cargando...</option></select>
    </div>

    <div class="setup-group">
      <label>ORIENTACIÓN</label>
      <select id="orient-select">
        <option value="h">Horizontal</option>
        <option value="v">Vertical (TV girada 90°)</option>
      </select>
    </div>

    <p id="setup-error"></p>
    <button id="start-btn">INICIAR</button>
  </div>

  <div id="dbg"></div>

  <!-- Hidden live face calibration -->
  <div id="cal-trigger" title="Ajustar cara"></div>
  <div id="cal-panel">
    <label>Posición horizontal <span class="val" id="cal-x-val"></span>
      <input id="cal-x" type="range" min="-600" max="600" step="1" value="0">
    </label>
    <label>Posición vertical <span class="val" id="cal-y-val"></span>
      <input id="cal-y" type="range" min="-600" max="600" step="1" value="0">
    </label>
    <label>Tamaño <span class="val" id="cal-s-val"></span>
      <input id="cal-s" type="range" min="0.4" max="2.5" step="0.01" value="1">
    </label>
    <label>Ganancia micrófono <span class="val" id="cal-g-val"></span>
      <input id="cal-g" type="range" min="0.5" max="12" step="0.1" value="3">
    </label>
    <div id="level-meter-wrap">
      <span>NIVEL ENTRADA</span>
      <div id="level-bar-bg"><div id="level-bar"></div></div>
    </div>
    <button id="cal-reset">Reset</button>
  </div>

  <!-- All display layers live in #stage so we can rotate the whole thing 90°
       for a portrait-mounted TV (body.vertical). -->
  <div id="stage">
    <!-- Looping background video (replaces the matrix canvas) -->
    <video id="bg-video" autoplay loop muted playsinline preload="auto">
      <source src="bg/bg3.mp4" type="video/mp4">
    </video>

    <!-- Face (hidden until setup complete) -->
    <canvas id="face-canvas" style="display:none"></canvas>
    <div id="scanlines" style="display:none"></div>
    <div id="bottom-fade" style="display:none"></div>
    <div id="subtitle-oracle" style="display:none"></div>
    <div id="subtitle" style="display:none"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script>
  // ── Setup screen logic ─────────────────────────────────────────
  const WS_PROTO  = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const WS_BASE   = `${WS_PROTO}//${location.host}`;
  const CAPTURE_RATE = 16000;  // must match BROWSER_CAPTURE_RATE in config.py

  let micStream = null;
  let captureCtx = null;
  let audioWs = null;
  var isMuted = false;  // var so face.js module can read it as window.isMuted

  async function populateDevices() {
    // Request mic permission first so labels are populated
    try {
      const tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
      tmp.getTracks().forEach(t => t.stop());
    } catch (_) {}

    const devices = await navigator.mediaDevices.enumerateDevices();
    const micSel = document.getElementById('mic-select');
    const outSel = document.getElementById('out-select');

    micSel.innerHTML = '';
    devices.filter(d => d.kind === 'audioinput').forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.deviceId;
      opt.textContent = d.label || `Micrófono ${micSel.options.length + 1}`;
      micSel.appendChild(opt);
    });

    await populatePersonalities();

    const supportsOutput = typeof AudioContext.prototype.setSinkId === 'function' ||
                           typeof HTMLAudioElement.prototype.setSinkId === 'function';
    if (supportsOutput) {
      outSel.innerHTML = '<option value="">Por defecto del sistema</option>';
      devices.filter(d => d.kind === 'audiooutput').forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = d.label || `Salida ${outSel.options.length}`;
        outSel.appendChild(opt);
      });
    } else {
      document.getElementById('out-group').style.display = 'none';
    }
  }

  async function populatePersonalities() {
    const sel = document.getElementById('personality-select');
    try {
      const res  = await fetch('/personalities');
      const data = await res.json();
      sel.innerHTML = '';
      data.items.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        if (p.id === data.default) opt.selected = true;
        sel.appendChild(opt);
      });
    } catch (_) {
      sel.innerHTML = '<option value="normal">Normal</option>';
    }
  }

  document.getElementById('start-btn').addEventListener('click', async () => {
    const errEl = document.getElementById('setup-error');
    errEl.textContent = '';
    const micId  = document.getElementById('mic-select').value;
    const outId  = document.getElementById('out-select').value;
    const personality = document.getElementById('personality-select').value || 'normal';
    const orientation = document.getElementById('orient-select').value;

    // Apply orientation BEFORE showing the face so the canvas sizes correctly.
    document.body.classList.toggle('vertical', orientation === 'v');
    if (window._applyOrientation) window._applyOrientation();

    try {
      await startAudio(micId, outId, personality);
      showFace();
    } catch (e) {
      errEl.textContent = `Error: ${e.message}`;
    }
  });

  const dbg = document.getElementById('dbg');
  let dbgChunks = 0, dbgPlay = 0, dbgRate = '?', dbgCtx = '?', dbgWs = '?';
  function dbgUpdate() {
    dbg.textContent = `ctx:${dbgCtx} ws:${dbgWs}\nrate:${dbgRate} mic:${dbgChunks} play:${dbgPlay}`;
  }

  async function startAudio(micId, outId, personality) {
    dbg.style.display = 'block';
    dbgCtx = 'creating'; dbgUpdate();

    // Tear down any previous capture first, so reconnects don't stack zombie
    // mic streams/contexts (which silently degrade the captured audio).
    try { if (micStream) micStream.getTracks().forEach(t => t.stop()); } catch (_) {}
    try { if (captureCtx) await captureCtx.close(); } catch (_) {}

    // ── Capture ──────────────────────────────────────────────
    captureCtx = new AudioContext({ sampleRate: CAPTURE_RATE });
    // iOS Safari: AudioContext starts suspended even inside a user gesture
    await captureCtx.resume();
    dbgCtx = captureCtx.state; dbgUpdate();

    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { deviceId: micId ? { exact: micId } : undefined, channelCount: 1 },
    });

    const actualRate = captureCtx.sampleRate;
    dbgRate = actualRate; dbgUpdate();

    await captureCtx.audioWorklet.addModule('audio-worklet.js');
    const source    = captureCtx.createMediaStreamSource(micStream);
    // Compressor/leveller: boosts quiet speech and limits loud peaks so the level
    // reaching STT stays consistent no matter how loud/soft or near/far you speak.
    const comp = captureCtx.createDynamicsCompressor();
    comp.threshold.value = -35;
    comp.knee.value      = 12;
    comp.ratio.value     = 8;
    comp.attack.value    = 0.003;
    comp.release.value   = 0.25;
    const micGain   = captureCtx.createGain();
    const _storedCal = (() => { try { return JSON.parse(localStorage.getItem('oracle_face_cal')) || {}; } catch(_) { return {}; } })();
    micGain.gain.value = _storedCal.g ?? 3.0;
    window._micGain = micGain;

    const micLevelAnalyser = captureCtx.createAnalyser();
    micLevelAnalyser.fftSize = 256;
    micLevelAnalyser.smoothingTimeConstant = 0.15;
    window._micAnalyser = micLevelAnalyser;

    const processor = new AudioWorkletNode(captureCtx, 'mic-processor', {
      processorOptions: { targetRate: CAPTURE_RATE, actualRate },
    });

    dbgWs = 'connecting'; dbgUpdate();
    const pq = personality ? `?personality=${encodeURIComponent(personality)}` : '';
    audioWs = new WebSocket(`${WS_BASE}/audio${pq}`);
    audioWs.binaryType = 'arraybuffer';

    audioWs.addEventListener('open', () => {
      dbgWs = 'open'; dbgUpdate();
      processor.port.onmessage = (e) => {
        if (!isMuted && audioWs.readyState === WebSocket.OPEN) {
          audioWs.send(e.data);
          dbgChunks++; if (dbgChunks % 50 === 0) dbgUpdate();
        }
      };
      source.connect(comp);
      comp.connect(micGain);
      micGain.connect(micLevelAnalyser);
      micLevelAnalyser.connect(processor);
    });
    audioWs.addEventListener('close', () => { dbgWs = 'closed'; dbgUpdate(); });
    audioWs.addEventListener('error', () => { dbgWs = 'ERROR'; dbgUpdate(); });

    // ── Playback ─────────────────────────────────────────────
    const playCtx = new AudioContext({ sampleRate: 24000 });
    await playCtx.resume(); // iOS Safari: also starts suspended
    if (outId && typeof playCtx.setSinkId === 'function') {
      await playCtx.setSinkId(outId).catch(() => {});
    }
    // AnalyserNode: browser reads amplitude from live playback each frame
    const analyser = playCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.4;
    analyser.connect(playCtx.destination);
    window._ttsAnalyser = analyser;  // face.js reads this

    let scheduledUntil = 0;
    let pendingVisemeSchedule = null;   // events waiting for next audio chunk to anchor
    window._currentViseme = null;       // last viseme shapes that fired
    window._lastVisemeAt  = 0;          // wall-clock time of last viseme

    audioWs.addEventListener('message', (e) => {
      // Text frames carry viseme schedules; bytes carry PCM audio
      if (typeof e.data === 'string') {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'viseme_schedule') {
            pendingVisemeSchedule = msg.events;
          }
        } catch (_) {}
        return;
      }
      if (!(e.data instanceof ArrayBuffer)) return;

      if (playCtx.state === 'suspended') playCtx.resume();

      const pcm16   = new Int16Array(e.data);
      const samples = pcm16.length;
      if (samples === 0) return;
      dbgPlay++; if (dbgPlay % 20 === 0) dbgUpdate();

      const buf = playCtx.createBuffer(1, samples, 24000);
      const ch  = buf.getChannelData(0);
      for (let i = 0; i < samples; i++) ch[i] = pcm16[i] / 32768;

      const src = playCtx.createBufferSource();
      src.buffer = buf;
      src.connect(analyser);
      const startAt = Math.max(playCtx.currentTime + 0.05, scheduledUntil);
      src.start(startAt);

      // Anchor pending viseme schedule to this chunk's actual playback time
      if (pendingVisemeSchedule) {
        const events = pendingVisemeSchedule;
        pendingVisemeSchedule = null;
        const nowCtx = playCtx.currentTime;
        for (const ev of events) {
          const delayMs = (startAt + ev.at - nowCtx) * 1000;
          setTimeout(() => {
            window._currentViseme = ev.shapes;
            window._lastVisemeAt  = Date.now();
          }, Math.max(0, delayMs));
        }
      }

      scheduledUntil = startAt + samples / 24000;
      // Wall-clock time when the currently-buffered audio will finish playing.
      // face.js uses this to keep ORACLE's subtitle up until speech truly ends.
      window._playbackEndsAt = Date.now() + Math.max(0, scheduledUntil - playCtx.currentTime) * 1000;
    });

    audioWs.addEventListener('close', () => {
      dbgWs = 'closed→retry'; dbgUpdate();
      setTimeout(() => startAudio(micId, outId, personality), 2000);
    });
  }

  function showFace() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('face-canvas').style.display = '';
    document.getElementById('scanlines').style.display = '';
    document.getElementById('subtitle').style.display = '';
    document.getElementById('subtitle-oracle').style.display = '';
    const bg = document.getElementById('bg-video');
    if (bg) bg.play().catch(() => {});
  }

  populateDevices();

  // ── Password gate (666) ─────────────────────────────────────────
  (function () {
    const gate = document.getElementById('pass-gate');
    const inp  = document.getElementById('pass-input');
    const err  = document.getElementById('pass-err');
    function tryPass() {
      if (inp.value.trim() === '666') {
        gate.style.display = 'none';
      } else {
        err.textContent = 'Contraseña incorrecta';
        inp.value = '';
      }
    }
    document.getElementById('pass-btn').addEventListener('click', tryPass);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryPass(); });
    inp.focus();
  })();

  // ── Live face calibration (X / Y / size), persisted, hidden panel ──
  (function () {
    const KEY = 'oracle_face_cal';
    const faceCanvas = document.getElementById('face-canvas');
    const xEl = document.getElementById('cal-x'), yEl = document.getElementById('cal-y'), sEl = document.getElementById('cal-s');
    const xVal = document.getElementById('cal-x-val'), yVal = document.getElementById('cal-y-val'), sVal = document.getElementById('cal-s-val');
    const gEl  = document.getElementById('cal-g');
    const gVal = document.getElementById('cal-g-val');
    let cal;
    try { cal = JSON.parse(localStorage.getItem(KEY)) || {}; } catch (_) { cal = {}; }
    cal = { x: cal.x ?? 0, y: cal.y ?? 0, s: cal.s ?? 1, g: cal.g ?? 3.0 };

    function apply() {
      faceCanvas.style.transform = `translate(${cal.x}px, ${cal.y}px) scale(${cal.s})`;
      xVal.textContent = cal.x + 'px'; yVal.textContent = cal.y + 'px'; sVal.textContent = cal.s.toFixed(2);
      xEl.value = cal.x; yEl.value = cal.y; sEl.value = cal.s;
      gEl.value = cal.g; gVal.textContent = cal.g.toFixed(1) + 'x';
    }
    function save() { try { localStorage.setItem(KEY, JSON.stringify(cal)); } catch (_) {} }
    apply();
    window._applyFaceCal = apply;

    xEl.addEventListener('input', () => { cal.x = +xEl.value; apply(); save(); });
    yEl.addEventListener('input', () => { cal.y = +yEl.value; apply(); save(); });
    sEl.addEventListener('input', () => { cal.s = +sEl.value; apply(); save(); });

    gEl.addEventListener('input', () => {
      cal.g = +gEl.value;
      gVal.textContent = cal.g.toFixed(1) + 'x';
      if (window._micGain) window._micGain.gain.value = cal.g;
      save();
    });

    document.getElementById('cal-reset').addEventListener('click', () => { cal = { x: 0, y: 0, s: 1, g: 3.0 }; apply(); save(); });

    // Level meter — reads RMS from the mic analyser each frame
    const levelBar = document.getElementById('level-bar');
    const _lvBuf   = new Uint8Array(128);
    (function animLevel() {
      requestAnimationFrame(animLevel);
      const analyser = window._micAnalyser;
      if (!analyser) { levelBar.style.width = '0%'; return; }
      analyser.getByteTimeDomainData(_lvBuf);
      let sum = 0;
      for (let i = 0; i < _lvBuf.length; i++) { const s = (_lvBuf[i] - 128) / 128; sum += s * s; }
      const pct = Math.min(100, Math.sqrt(sum / _lvBuf.length) * 500);
      levelBar.style.width  = pct + '%';
      levelBar.style.background = pct > 75 ? '#f44' : pct > 45 ? '#ff0' : '#0f0';
    })();

    // Hidden corner dot toggles the panel open/closed.
    const panel = document.getElementById('cal-panel');
    document.getElementById('cal-trigger').addEventListener('click', () => panel.classList.toggle('open'));
  })();
  </script>

  <script type="module" src="face.js?v=5"></script>
</body>
</html>
